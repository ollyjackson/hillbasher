
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; image-rendering: pixelated; }
  #game-wrap { font-family: 'Press Start 2P', monospace; background: #1a1a2e; width: 100%; padding: 16px; border-radius: 8px; user-select: none; }
  #canvas { display: block; margin: 0 auto; border: 3px solid #4a4a8a; background: #1a1a2e; }
  #hud { display: flex; justify-content: space-between; align-items: center; padding: 8px 4px; max-width: 640px; margin: 0 auto; }
  .hud-txt { color: #c0dd97; font-size: 9px; }
  #bash-btn { display: block; margin: 10px auto 0; background: #3B6D11; color: #c0dd97; border: 3px solid #97C459; font-family: 'Press Start 2P', monospace; font-size: 11px; padding: 14px 36px; cursor: pointer; border-radius: 0; letter-spacing: 1px; }
  #bash-btn:active { transform: scale(0.96); background: #27500A; }
  #msg { text-align: center; color: #EF9F27; font-family: 'Press Start 2P', monospace; font-size: 10px; min-height: 20px; padding: 6px 0 2px; max-width: 640px; margin: 0 auto; }
</style>

<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;">Hill climb button basher game — mash the button to reach the tower at the top of the forested hill.</h2>
<div id="game-wrap">
  <div id="hud">
    <span class="hud-txt">PROGRESS: <span id="pct">0%</span></span>
    <span class="hud-txt" id="status-txt">PRESS TO CLIMB!</span>
    <span class="hud-txt">BEST: <span id="best">--</span></span>
  </div>
  <canvas id="canvas" width="640" height="320"></canvas>
  <div id="msg">Mash the button to climb the hill!</div>
  <button id="bash-btn">&#9654; CLIMB!</button>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = 640, H = 320;

const SKY = '#1a1a2e';
const HILLCOL = ['#27500A','#3B6D11','#639922'];
const TREETRUNK = '#633806';
const TREELEAF = ['#3B6D11','#639922','#27500A'];
const PATHCOL = '#854F0B';
const TOWERCOL = '#888780';
const TOWERDARK = '#444441';
const FLAGCOL = '#E24B4A';

let progress = 0; // 0..1
let velocity = 0;
let gameState = 'idle'; // idle, playing, won
let bestTime = null;
let startTime = null;
let animFrame = null;
let lastBash = 0;
let particles = [];
let playerBob = 0;
let playerBobDir = 1;

function hillY(x) {
  const t = x / W;
  return H - 60 - t * 160 + 40 * Math.sin(t * Math.PI);
}

function playerPos() {
  const px = 60 + progress * (W - 120);
  const py = hillY(px) - 16;
  return { x: px, y: py };
}

function drawSky() {
  ctx.fillStyle = SKY;
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#2d2d5e';
  for (let i = 0; i < 40; i++) {
    const sx = ((i * 137 + 11) % W);
    const sy = ((i * 97 + 7) % 90);
    const ss = (i % 3 === 0) ? 2 : 1;
    ctx.fillRect(sx, sy, ss, ss);
  }
}

function drawHill() {
  ctx.beginPath();
  ctx.moveTo(0, H);
  for (let x = 0; x <= W; x += 4) {
    ctx.lineTo(x, hillY(x));
  }
  ctx.lineTo(W, H);
  ctx.closePath();
  const grd = ctx.createLinearGradient(0, 80, 0, H);
  grd.addColorStop(0, '#3B6D11');
  grd.addColorStop(0.4, '#27500A');
  grd.addColorStop(1, '#173404');
  ctx.fillStyle = grd;
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(0, H);
  for (let x = 0; x <= W; x += 4) {
    ctx.lineTo(x, hillY(x) + 6);
  }
  ctx.lineTo(W, H);
  ctx.closePath();
  ctx.fillStyle = '#639922';
  ctx.fill();
}

function drawPath() {
  ctx.beginPath();
  for (let x = 60; x <= W - 60; x += 4) {
    const py = hillY(x) + 2;
    if (x === 60) ctx.moveTo(x, py);
    else ctx.lineTo(x, py);
  }
  ctx.strokeStyle = PATHCOL;
  ctx.lineWidth = 5;
  ctx.setLineDash([8, 10]);
  ctx.stroke();
  ctx.setLineDash([]);
}

const TREES = [];
(function() {
  const positions = [80, 150, 210, 300, 370, 440, 500, 560];
  positions.forEach((bx, i) => {
    const offsets = [-28, -12, 10, 26];
    offsets.forEach((dx, j) => {
      TREES.push({ x: bx + dx + (i % 2) * 5, size: 12 + (j % 3) * 5, leaf: j % 3 });
    });
  });
})();

function drawTrees() {
  TREES.forEach(tr => {
    const ty = hillY(tr.x) - 2;
    const th = tr.size * 2.5;
    ctx.fillStyle = TREETRUNK;
    ctx.fillRect(tr.x - 2, ty - 6, 4, 10);
    ctx.fillStyle = TREELEAF[tr.leaf];
    ctx.fillRect(tr.x - tr.size, ty - th, tr.size * 2, th);
    ctx.fillStyle = TREELEAF[(tr.leaf + 1) % 3];
    ctx.fillRect(tr.x - tr.size + 4, ty - th - 8, tr.size * 2 - 8, 12);
  });
}

function drawTower() {
  const tx = W - 60;
  const ty = hillY(tx);
  const tw = 28, th = 60;
  ctx.fillStyle = TOWERDARK;
  ctx.fillRect(tx - tw / 2, ty - th, tw, th);
  ctx.fillStyle = TOWERCOL;
  ctx.fillRect(tx - tw / 2, ty - th, tw, 6);
  ctx.fillRect(tx - tw / 2 - 5, ty - th - 10, 8, 14);
  ctx.fillRect(tx + tw / 2 - 3, ty - th - 10, 8, 14);
  for (let row = 1; row < 5; row++) {
    ctx.fillStyle = '#2C2C2A';
    ctx.fillRect(tx - 7, ty - th + row * 12, 6, 8);
    ctx.fillRect(tx + 2, ty - th + row * 12, 6, 8);
  }
  ctx.fillStyle = FLAGCOL;
  ctx.fillRect(tx - 1, ty - th - 10, 2, 24);
  ctx.fillStyle = '#E24B4A';
  ctx.fillRect(tx + 1, ty - th - 10, 14, 10);
  ctx.fillStyle = '#F09595';
  ctx.fillRect(tx + 1, ty - th - 10, 14, 4);
}

function drawPlayer() {
  const { x, y } = playerPos();
  const bob = gameState === 'playing' ? playerBob : 0;
  const py = y + bob;

  ctx.fillStyle = '#FAC775';
  ctx.fillRect(x - 5, py - 18, 10, 10);
  ctx.fillStyle = '#185FA5';
  ctx.fillRect(x - 6, py - 9, 12, 12);
  ctx.fillStyle = '#FAC775';
  const legPhase = Math.sin(Date.now() / 80);
  ctx.fillRect(x - 6, py + 3, 5, 7 + (legPhase > 0 ? 2 : 0));
  ctx.fillRect(x + 1, py + 3, 5, 7 + (legPhase < 0 ? 2 : 0));
  ctx.fillStyle = '#633806';
  ctx.fillRect(x - 6, py - 18, 12, 5);
  ctx.fillStyle = '#E24B4A';
  ctx.fillRect(x - 6, py - 9, 5, 5);
  ctx.fillRect(x + 1, py - 9, 5, 5);
}

function drawParticles() {
  particles = particles.filter(p => p.life > 0);
  particles.forEach(p => {
    ctx.fillStyle = p.col;
    ctx.globalAlpha = p.life / 20;
    ctx.fillRect(Math.round(p.x), Math.round(p.y), 4, 4);
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.3;
    p.life--;
  });
  ctx.globalAlpha = 1;
}

function spawnParticles(x, y) {
  for (let i = 0; i < 6; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 4,
      vy: -Math.random() * 3 - 1,
      col: HILLCOL[i % 3],
      life: 16 + Math.floor(Math.random() * 8)
    });
  }
}

function drawProgressBar() {
  const bw = 300, bh = 10;
  const bx = (W - bw) / 2, by = 10;
  ctx.fillStyle = '#2C2C2A';
  ctx.fillRect(bx, by, bw, bh);
  ctx.fillStyle = '#639922';
  ctx.fillRect(bx, by, Math.round(progress * bw), bh);
  ctx.strokeStyle = '#27500A';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, bw, bh);
  ctx.fillStyle = '#c0dd97';
  ctx.font = '8px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillText('SUMMIT', W / 2, by + bh + 14);
}

function drawWin() {
  ctx.fillStyle = 'rgba(26,26,46,0.75)';
  ctx.fillRect(0, 80, W, 120);
  ctx.fillStyle = '#EF9F27';
  ctx.font = '16px "Press Start 2P"';
  ctx.textAlign = 'center';
  ctx.fillText('YOU MADE IT!', W / 2, 130);
  ctx.fillStyle = '#c0dd97';
  ctx.font = '9px "Press Start 2P"';
  const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
  ctx.fillText('TIME: ' + elapsed + 's', W / 2, 158);
  if (bestTime) ctx.fillText('BEST: ' + bestTime + 's', W / 2, 178);
}

function render() {
  ctx.clearRect(0, 0, W, H);
  drawSky();
  drawHill();
  drawPath();
  drawTrees();
  drawTower();
  drawParticles();
  if (gameState !== 'idle' || progress > 0) drawPlayer();
  drawProgressBar();
  if (gameState === 'won') drawWin();
}

function gameLoop() {
  if (gameState === 'playing') {
    velocity *= 0.88;
    progress = Math.min(1, progress + velocity);

    playerBob += playerBobDir * 0.4;
    if (Math.abs(playerBob) > 2) playerBobDir *= -1;

    document.getElementById('pct').textContent = Math.round(progress * 100) + '%';

    if (progress >= 1) {
      gameState = 'won';
      const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
      if (!bestTime || elapsed < bestTime) {
        bestTime = elapsed;
        document.getElementById('best').textContent = bestTime + 's';
      }
      document.getElementById('status-txt').textContent = 'SUMMIT REACHED!';
      document.getElementById('msg').textContent = 'You reached the tower! Press CLIMB to go again!';
      document.getElementById('bash-btn').textContent = '\u25B6 PLAY AGAIN';
    }
  }
  render();
  animFrame = requestAnimationFrame(gameLoop);
}

function bash() {
  const now = Date.now();
  if (gameState === 'won') {
    progress = 0;
    velocity = 0;
    gameState = 'playing';
    startTime = Date.now();
    document.getElementById('bash-btn').textContent = '\u25B6 CLIMB!';
    document.getElementById('status-txt').textContent = 'CLIMBING...';
    document.getElementById('msg').textContent = 'Keep mashing!';
    document.getElementById('pct').textContent = '0%';
    return;
  }
  if (gameState === 'idle') {
    gameState = 'playing';
    startTime = Date.now();
    document.getElementById('status-txt').textContent = 'CLIMBING...';
  }

  const timeSinceLast = now - lastBash;
  const boost = timeSinceLast < 300 ? 0.012 : 0.006;
  velocity += boost;
  velocity = Math.min(velocity, 0.025);
  lastBash = now;

  const { x, y } = playerPos();
  spawnParticles(x, y + 10);

  const msgs = ['Huff!', 'Keep going!', 'Puff!', 'Almost there!', 'Push it!', 'Legs burning!'];
  if (progress < 0.9) {
    document.getElementById('msg').textContent = msgs[Math.floor(Math.random() * msgs.length)];
  } else {
    document.getElementById('msg').textContent = 'SO CLOSE! SMASH IT!';
  }
}

document.getElementById('bash-btn').addEventListener('click', bash);
document.addEventListener('keydown', e => {
  if ([' ', 'Enter', 'ArrowUp', 'z', 'x'].includes(e.key)) {
    e.preventDefault();
    bash();
  }
});

gameLoop();
</script>
